<!DOCTYPE html>
<html lang="hi">
<head>
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroMAPS AI | Strategic Market Insights</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(76, 201, 240, 0.15) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(247, 37, 133, 0.1) 0, transparent 50%);
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem 2rem;
            border-radius: 24px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: clamp(2rem, 8vw, 3.2rem);
            background: linear-gradient(to right, #4cc9f0, #4361ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }
        .tagline { color: #94a3b8; font-size: 1.1rem; margin-bottom: 2.5rem; }
        .links { display: flex; flex-direction: column; gap: 18px; }
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .link-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(67, 97, 238, 0.3);
        }
        /* Button Colors */
        .youtube:hover { border-color: #ff0000; color: #ff0000; }
        .linkedin:hover { border-color: #0077b5; color: #0077b5; }
        .telegram:hover { border-color: #0088cc; color: #0088cc; }
        .whatsapp:hover { border-color: #25d366; color: #25d366; }
        
        i { font-size: 1.3rem; }
        .footer-text { margin-top: 2.5rem; font-size: 0.85rem; color: #64748b; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>AstroMAPS AI</h1>
        <p class="tagline">Where Planetary Logic Meets Market Trends</p>
        
        <div class="links">
            <a href="https://www.youtube.com/@AstroMAPSAI" class="link-btn youtube" target="_blank">
                <i class="fab fa-youtube"></i> YouTube Channel
            </a>
            
            <a href="https://www.linkedin.com/in/YOUR-PROFILE" class="link-btn linkedin" target="_blank">
                <i class="fab fa-linkedin"></i> LinkedIn Professional
            </a>
            
            <a href="https://t.me/astromapsai" class="link-btn telegram" target="_blank">
                <i class="fab fa-telegram"></i> Telegram Community
            </a>
            
            <a href="https://wa.me/917727054744" class="link-btn whatsapp" target="_blank">
                <i class="fab fa-whatsapp"></i> Contact on WhatsApp
            </a>
        </div>
        
        <p class="footer-text">
            Built with 35+ Years of Research Experience
        </p>
    </div>
</body>
</html>
